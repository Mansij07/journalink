# Requires metrics-server in the cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: journalink
  namespace: journalink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: journalink
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
